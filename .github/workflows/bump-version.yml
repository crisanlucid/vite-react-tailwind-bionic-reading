# Manually triggered version bump.
# Bumps package.json + package-lock.json, pushes directly to main,
# then pushes the tag (triggers create-release.yml).

name: Bump version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver type of new version (major / minor / patch)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Git
        run: |
          git config user.name 'Lucian Bot'
          git config user.email 'crisan.lucid@yahoo.com'

      - name: Bump version
        run: npm version ${{ github.event.inputs.version }}

      - name: Push version bump to main
        run: git push origin HEAD:main

      - name: Push tag (triggers create-release workflow)
        run: git push origin --tags
