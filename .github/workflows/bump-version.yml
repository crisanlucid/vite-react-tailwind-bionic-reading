# Manually triggered version bump.
# Bumps package.json + package-lock.json, pushes the tag, and opens a PR.
# Merging the PR triggers create-release.yml to create the GitHub Release.

name: Bump version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver type of new version (major / minor / patch)'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config user.name 'Lucian Bot'
          git config user.email 'crisan.lucid@yahoo.com'

      - name: Bump version
        run: npm version ${{ github.event.inputs.version }}

      - name: Push version bump branch
        run: |
          VERSION=$(node -p "require('./package.json').version")
          git checkout -b chore/bump-v${VERSION}
          git push origin chore/bump-v${VERSION}

      - name: Open PR for version bump
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh pr create \
            --title "chore: bump version to v${VERSION}" \
            --body "Automated version bump triggered by the Bump version workflow." \
            --base main \
            --head "chore/bump-v${VERSION}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push tag
        run: git push origin --tags
